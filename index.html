<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einkauf Speed-App</title>
    <!-- Apple specific  -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3737/3737372.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .done-text { text-decoration: line-through; opacity: 0.4; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        main { height: 100%; overflow-y: auto; display: flex; flex-direction: column; }
        @keyframes loadingStrip { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .animate-loading { animation: loadingStrip 1.5s infinite linear; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">

    <main id="app" class="max-w-md mx-auto bg-white dark:bg-slate-900 shadow-2xl relative overflow-hidden">
        <div id="loadingBar" class="hidden absolute top-0 left-0 w-full h-1 bg-blue-100 dark:bg-slate-800 z-30 overflow-hidden">
            <div class="w-full h-full bg-blue-600 dark:bg-blue-500 animate-loading"></div>
        </div>
        <header class="p-4 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-black text-blue-600 dark:text-blue-400 tracking-tight">EINKAUF</h1>
            <div class="flex items-center gap-1 relative">
                <div class="mr-2 text-slate-400 dark:text-slate-500 text-xs font-bold transition-opacity" id="syncStatus"></div>
                <button onclick="app.refresh()" title="Aktualisieren" class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
                </button>
                <button onclick="app.toggleMenu()" title="Menü" class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
                </button>

                <!-- Hamburger Menu Dropdown -->
                <div id="dropdownMenu" class="hidden absolute top-full right-0 mt-2 w-52 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden z-50">
                    <button onclick="app.clearDone(); app.toggleMenu()" class="w-full text-left px-4 py-3 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        Erledigte aufräumen
                    </button>
                    <div class="h-px bg-slate-100 dark:bg-slate-700"></div>
                    <button onclick="app.showSettings(); app.toggleMenu()" class="w-full text-left px-4 py-3 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        Einstellungen
                    </button>
                </div>
            </div>
        </header>

        <!-- overlay to close menu when clicking outside -->
        <div id="menuOverlay" onclick="app.toggleMenu()" class="hidden fixed inset-0 z-40 bg-transparent"></div>

        <section class="p-4 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 sticky top-[61px] z-10">
            <form id="addForm" class="flex gap-2">
                <input type="text" id="itemName" autocomplete="off" placeholder="Was fehlt?" class="flex-1 p-3 border-2 border-slate-100 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 focus:border-blue-500 dark:focus:border-blue-500 outline-none text-lg transition-all text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500">
                <button type="submit" class="bg-blue-600 dark:bg-blue-600/90 text-white p-3 rounded-xl hover:bg-blue-700 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </form>
        </section>

        <section id="listContainer" class="flex-1 overflow-y-auto p-4 space-y-2 pb-20 bg-white dark:bg-slate-900">
            </section>

        <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 bg-slate-800 dark:bg-slate-700 text-white text-sm rounded-full shadow-2xl z-50 whitespace-nowrap"></div>
    </main>

    <script>
        const app = {
            url: localStorage.getItem('shopping_gas_url'),
            items: JSON.parse(localStorage.getItem('shopping_cache') || '[]'),
            menuOpen: false,
            pendingRequests: 0,
            syncTimeout: null,
            actionQueue: [],
            isProcessingQueue: false,

            init() {
                if (!this.url) {
                    this.items = [];
                    localStorage.removeItem('shopping_cache');
                    // Timeout to let DOM load fully before prompting
                    setTimeout(() => {
                        const setupUrl = prompt("Google Apps Script URL eingeben:");
                        if (setupUrl) { localStorage.setItem('shopping_gas_url', setupUrl); this.url = setupUrl; this.refresh(); }
                    }, 500);
                }
                this.render();
                if (this.url) this.refresh();
                
                document.getElementById('addForm').onsubmit = (e) => {
                    e.preventDefault();
                    this.addItem();
                };
            },

            toggleMenu() {
                this.menuOpen = !this.menuOpen;
                const menu = document.getElementById('dropdownMenu');
                const overlay = document.getElementById('menuOverlay');
                if (this.menuOpen) {
                    menu.classList.remove('hidden');
                    overlay.classList.remove('hidden');
                } else {
                    menu.classList.add('hidden');
                    overlay.classList.add('hidden');
                }
            },

            showSettings() {
                if(confirm("Datenquelle löschen und App neu einrichten?")) {
                    localStorage.removeItem('shopping_gas_url');
                    localStorage.removeItem('shopping_cache');
                    this.items = [];
                    location.reload();
                }
            },

            showToast(msg, duration = 3000) {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.classList.remove('hidden');
                setTimeout(() => t.classList.add('hidden'), duration);
            },

            setSyncState(state) {
                const el = document.getElementById('syncStatus');
                const bar = document.getElementById('loadingBar');
                if (state === 'syncing') {
                    el.innerHTML = '<span class="text-blue-500 dark:text-blue-400 animate-pulse">Lädt...</span>';
                    bar?.classList.remove('hidden');
                } else if (state === 'error') {
                    el.innerHTML = '<span class="text-red-500 dark:text-red-400">Offline</span>';
                    bar?.classList.add('hidden');
                } else if (state === 'ok') {
                    el.innerHTML = '<span class="text-green-500 dark:text-green-400">Aktuell</span>';
                    bar?.classList.add('hidden');
                    setTimeout(() => { if(el.innerText === 'Aktuell') el.innerHTML = ''; }, 3000);
                }
            },

            async refresh() {
                if (this.pendingRequests > 0) return;

                this.setSyncState('syncing');
                try {
                    const res = await fetch(this.url);
                    const data = await res.json();

                    if (this.pendingRequests > 0) return;

                    this.items = data;
                    localStorage.setItem('shopping_cache', JSON.stringify(data));
                    this.render();
                    this.setSyncState('ok');
                } catch (e) {
                    this.setSyncState('error');
                    this.showToast("Offline / Verbindung fehlgeschlagen");
                }
            },

            async apiPost(payload) {
                this.pendingRequests++;
                this.setSyncState('syncing');

                if (this.syncTimeout) {
                    clearTimeout(this.syncTimeout);
                    this.syncTimeout = null;
                }

                this.actionQueue.push(payload);
                if (!this.isProcessingQueue) {
                    this.processQueue();
                }
            },

            async processQueue() {
                this.isProcessingQueue = true;

                while (this.actionQueue.length > 0) {
                    const payload = this.actionQueue[0];
                    try {
                        await fetch(this.url, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify(payload)
                        });
                    } catch (e) {
                        this.setSyncState('error');
                        this.showToast("Offline / Fehler beim Senden");
                    }
                    this.actionQueue.shift();
                    this.pendingRequests--;
                }

                this.isProcessingQueue = false;
                
                if (this.pendingRequests === 0) {
                    this.syncTimeout = setTimeout(() => {
                        this.refresh();
                    }, 1500);
                }
            },

            addItem() {
                const el = document.getElementById( 'itemName' );
                const val = el.value.trim();
                if (!val) return;

                const newId = Date.now().toString();
                const newItem = { id: newId, name: val, status: 'offen' };
                
                this.items.push(newItem);
                this.render();
                el.value = '';

                this.apiPost({ action: 'add', id: newId, name: val });
            },

            toggle(id) {
                const item = this.items.find(i => i.id == id);
                if (!item) return;

                const targetStatus = item.status === 'offen' ? 'erledigt' : 'offen';
                item.status = targetStatus;
                this.render();

                this.apiPost({ action: 'toggle', id: id, status: targetStatus });
            },

            deleteItem(id) {
                if(!confirm("Eintrag wirklich löschen?")) return;
                
                this.items = this.items.filter(i => i.id != id);
                this.render();

                this.apiPost({ action: 'delete', id: id });
            },

            clearDone() {
                const doneItems = this.items.filter(i => i.status === 'erledigt');
                if (doneItems.length === 0) {
                    this.showToast("Keine erledigten Einträge vorhanden");
                    return;
                }
                
                if(!confirm("Alle erledigten Einträge unwiederbringlich löschen?")) return;

                this.items = this.items.filter(i => i.status !== 'erledigt');
                this.render();

                this.apiPost({ action: 'clearDone' });
                this.showToast(`${doneItems.length} Einträge gelöscht`);
            },

            render() {
                const container = document.getElementById('listContainer');
                if (this.items.length === 0) {
                    container.innerHTML = '<div class="text-center text-slate-400 dark:text-slate-500 mt-10">Keine Einträge</div>';
                    return;
                }

                const sorted = [...this.items].sort((a, b) => {
                    if (a.status === b.status) return 0;
                    return a.status === 'offen' ? -1 : 1;
                });

                let html = '';
                sorted.forEach(item => {
                    const isDone = item.status === 'erledigt';
                    html += `
                        <div class="flex items-center gap-3 p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm active:bg-slate-50 dark:active:bg-slate-700/80 transition-colors" onclick="app.toggle('${item.id}')">
                            <div class="w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${isDone ? 'bg-green-500 border-green-500 dark:bg-green-600 dark:border-green-600' : 'border-slate-300 dark:border-slate-500'}">
                                ${isDone ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
                            </div>
                            <span class="flex-1 text-lg leading-tight transition-colors ${isDone ? 'done-text text-slate-400 dark:text-slate-500' : 'text-slate-800 dark:text-slate-200'}">${item.name}</span>
                            <button onclick="event.stopPropagation(); app.deleteItem('${item.id}')" class="p-2 -mr-2 text-red-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 dark:text-red-400/80 dark:hover:text-red-400 rounded-full transition-colors active:scale-95 shrink-0" title="Löschen">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
        };

        app.init();
    </script>
</body>
</html>
